<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transporte Scan</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Cabecera compacta */
        .header { background: #1a1a1a; padding: 10px; text-align: center; font-size: 16px; font-weight: bold; border-bottom: 1px solid #333; }
        
        /* Selector de ruta */
        .controls { padding: 10px; background: #000; }
        select { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; background: #222; color: #00d2ff; outline: none; appearance: none; text-align: center; }
        
        /* CONTENEDOR DE CÁMARA REDUCIDO (40% de alto) */
        #reader-container { 
            width: 100%; 
            height: 40vh; /* Ocupa solo el 40% de la altura de la pantalla */
            background: #000; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-top: 2px solid #333;
            border-bottom: 2px solid #333;
        }
        #reader { width: 100%; height: 100%; }
        /* Ajuste para que el video se adapte al contenedor chico */
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        
        /* BARRA DE RESULTADOS GIGANTE (Prioridad visual) */
        .result-container { 
            flex-grow: 1; /* Ocupa todo el espacio restante */
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 20px;
            transition: background 0.1s;
        }
        
        /* Estados de la barra de resultados */
        .esperando { background: #111; color: #aaa; }
        .validando { background: #111; color: #ffc107; }
        .ok { background: #28a745; color: white; }
        .err { background: #dc3545; color: white; }

        /* Texto del resultado GIGANTE */
        #res-text { font-size: 32px; font-weight: 900; line-height: 1.2; text-transform: uppercase; }
        #res-subtext { font-size: 18px; margin-top: 5px; opacity: 0.8; }

    </style>
</head>
<body>
    <div class="header">Transporte Scan</div>
    
    <div class="controls">
        <select id="ruta">
            <option value="Real_palmas">🚌 Ruta: Real Palmas</option>
            <option value="Villas_alcala">🚌 Ruta: Villas Alcalá</option>
        </select>
    </div>

    <div id="reader-container">
        <div id="reader"></div>
    </div>
    
    <div id="res-container" class="result-container esperando">
        <div id="res-text">Escaneando...</div>
        <div id="res-subtext">Acerque el código QR</div>
    </div>

    <script>
        // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        const SCRIPT_URL = "TU_URL_DE_GOOGLE_SCRIPT"; 
        
        const html5QrCode = new Html5Qrcode("reader");
        let bloqueado = false; // Control para modo ráfaga

        function onScanSuccess(decodedText) {
            if (bloqueado) return;
            bloqueado = true; 
            
            const resContainer = document.getElementById("res-container");
            const resText = document.getElementById("res-text");
            const resSubtext = document.getElementById("res-subtext");
            
            resText.innerText = "Verificando...";
            resSubtext.innerText = "Código: " + decodedText;
            resContainer.className = "result-container validando";

            fetch(`${SCRIPT_URL}?id=${decodedText}&ruta=${document.getElementById("ruta").value}`)
                .then(response => response.json())
                .then(data => {
                    // Separar el icono del mensaje para diseño
                    let mensaje = data.mensaje;
                    let icono = mensaje.substring(0, 2); // ✅, ❌ o 🚫
                    let texto = mensaje.substring(2);

                    resText.innerText = icono + texto;
                    resSubtext.innerText = (data.status === "OK") ? "Pase por favor" : "Acceso denegado";
                    resContainer.className = "result-container " + (data.status === "OK" ? "ok" : "err");
                    
                    // Tiempo de parpadeo (0.8 seg)
                    setTimeout(() => { 
                        resText.innerText = "Escaneando...";
                        resSubtext.innerText = "Acerque el código QR";
                        resContainer.className = "result-container esperando";
                        bloqueado = false; 
                    }, 800);
                })
                .catch(error => {
                    resText.innerText = "⚠️ Error";
                    resSubtext.innerText = "Problema de conexión";
                    resContainer.className = "result-container err";
                    setTimeout(() => { bloqueado = false; }, 1000);
                });
        }

        // Iniciamos la cámara. El tamaño del qrbox también se reduce.
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 20, qrbox: { width: 150, height: 150 } }, 
            onScanSuccess
        );
    </script>
</body>
</html>
