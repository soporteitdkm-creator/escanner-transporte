<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; }
        
        /* CÁMARA MUY PEQUEÑA */
        #reader-wrapper { width: 160px; height: 160px; margin: 10px auto; border: 3px solid #333; border-radius: 20px; overflow: hidden; position: relative; }
        #reader { width: 100%; height: 100%; }

        .selector { padding: 10px; }
        select { width: 100%; padding: 12px; border-radius: 10px; background: #222; color: #fff; border: 1px solid #444; font-size: 16px; }

        /* ÁREA DE RESULTADO GIGANTE */
        #res-box { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: 0.2s; }
        
        .msg-main { font-size: 45px; font-weight: bold; padding: 10px; line-height: 1; }
        .msg-sub { font-size: 20px; margin-top: 10px; opacity: 0.8; }

        /* COLORES */
        .color-buscando { background: #111; }
        .color-ok { background: #1b5e20; } /* Verde oscuro */
        .color-ruta { background: #e65100; } /* Naranja */
        .color-error { background: #b71c1c; } /* Rojo */
    </style>
</head>
<body>

    <div class="selector">
        <select id="ruta">
            <option value="Real_palmas">Real Palmas</option>
            <option value="Villas_alcala">Villas Alcalá</option>
        </select>
    </div>

    <div id="reader-wrapper">
        <div id="reader"></div>
    </div>

    <div id="res-box" class="color-buscando">
        <div id="msg-main">ESPERANDO</div>
        <div id="msg-sub">Escanee un código QR</div>
    </div>

    <script>
        // Busca esta línea en tu archivo index.html de GitHub y pégalo así:
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuzOA0muWLjxRrTZ-uKX7X8ELfMKVgdnydVu0AxqoYVKiYMcYw8k4rPfTCygScxc2MpQ/exec";

        const html5QrCode = new Html5Qrcode("reader");
        let activo = true;

        function leer(id) {
            if(!activo) return;
            activo = false;

            const box = document.getElementById("res-box");
            const m1 = document.getElementById("msg-main");
            const m2 = document.getElementById("msg-sub");

            m1.innerText = "VERIFICANDO...";
            box.className = "color-buscando";

            fetch(`${SCRIPT_URL}?id=${id}&ruta=${document.getElementById("ruta").value}`)
                .then(r => r.json())
                .then(data => {
                    m1.innerText = data.mensaje;
                    
                    if(data.status === "OK") {
                        box.className = "color-ok";
                        m2.innerText = "ACCESO PERMITIDO";
                    } else if(data.status === "RUTA") {
                        box.className = "color-ruta";
                        m2.innerText = "RUTA EQUIVOCADA";
                    } else {
                        box.className = "color-error";
                        m2.innerText = "USUARIO NO VÁLIDO";
                    }

                    setTimeout(() => {
                        box.className = "color-buscando";
                        m1.innerText = "LISTO";
                        m2.innerText = "Escanee el siguiente";
                        activo = true;
                    }, 1200);
                })
                .catch(() => {
                    m1.innerText = "SIN CONEXIÓN";
                    box.className = "color-error";
                    setTimeout(() => { activo = true; }, 2000);
                });
        }

        html5QrCode.start({ facingMode: "environment" }, { fps: 25, qrbox: 150 }, leer);
    </script>
</body>
</html>
